<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* قسم الهيدر مع صورة خلفية رياضية */
        .hero-section {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=1470&auto=format&fit=crop');
            background-size: cover; background-position: center;
            padding: 80px 0; border-bottom: 4px solid #00ff88;
        }

        /* تصميم الكروت الحديثة */
        .exercise-card {
            background: #161616; border: 1px solid #333; border-radius: 20px;
            transition: 0.3s; overflow: hidden; height: 100%;
        }
        .exercise-card:hover {
            transform: translateY(-10px); border-color: #00ff88;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.2);
        }
        
        .btn-gym { background-color: #00ff88; color: #000; font-weight: bold; border-radius: 12px; }
        .btn-gym:hover { background-color: #00cc6e; color: #000; }
        
        .form-control { background: #222; border: 1px solid #444; color: #fff; border-radius: 10px; }
        .form-control:focus { background: #222; color: #fff; border-color: #00ff88; box-shadow: none; }
    </style>
</head>
<body>

<div class="hero-section text-center">
    <h1 class="display-4 fw-bold">لوحة أداء الأبطال 🔥</h1>
    <p class="lead text-secondary">سجل عداتك النهاردة.. بكرة هتكون أقوى</p>
</div>

<div class="container mt-5">
    <div class="row g-4">
        {% for ex in exercises %}
        <div class="col-md-4">
            <div class="card exercise-card p-4">
                <h3 class="text-success mb-3">{{ ex.name }}</h3>
                <p class="text-secondary small">الهدف المخطط: {{ ex.sets }} مجموعات × {{ ex.reps }} عدات</p>
                
                <form action="{% url 'log_workout' ex.id %}" method="post" class="mt-auto">
                    {% csrf_token %}
                    <div class="row g-2 mb-3">
                        <div class="col"><input type="number" name="actual_sets" class="form-control" placeholder="مجموعات" required></div>
                        <div class="col"><input type="number" name="actual_reps" class="form-control" placeholder="عدات" required></div>
                    </div>
                    <button type="submit" class="btn btn-gym w-100 p-2 text-uppercase">حفظ التمرين</button>
                </form>
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="text-center my-5 py-4">
        <a href="{% url 'progress_analysis' %}" class="btn btn-outline-light btn-lg px-5 border-2 fw-bold">تحليل التقدم الشامل 📊</a>
    </div>
</div>

</body>
</html>
